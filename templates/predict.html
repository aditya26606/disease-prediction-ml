<!DOCTYPE html>
<html>
<head>

<title>Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
font-family:Poppins;

background:linear-gradient(120deg,#2c7be5,#00c6ff);

}

header{

background:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;

}


.form-section{

height:90vh;
display:flex;
justify-content:center;
align-items:center;

}


.form-box{

background:white;
padding:40px;
width:400px;

border-radius:15px;

box-shadow:0px 10px 30px rgba(0,0,0,.3);

}

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;

}


button{

width:100%;
padding:15px;

background:#2c7be5;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}


button:hover{

background:#00c6ff;

}

</style>

</head>


<body>

<header>

Chickenpox Prediction System

</header>


<section class="form-section">


<div class="form-box">

<h2>Enter Patient Data</h2>

<form action="/result" method="post">

<input name="budapest" placeholder="Budapest Cases" required>

<input name="pest" placeholder="Pest Cases" required>

<input name="fejer" placeholder="Fejer Cases" required>

<input name="komarom" placeholder="Komarom Cases" required>

<input name="veszprem" placeholder="Veszprem Cases" required>

<input name="gyor" placeholder="Gyor Cases" required>


<button type="submit">

Predict Disease Risk

</button>


</form>

</div>

</section>

</body>

</html>
