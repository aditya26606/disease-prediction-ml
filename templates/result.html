<!DOCTYPE html>
<html>
<head>

<title>Result</title>

<style>

body{

font-family:Poppins;

background:#f5f7fb;

}


.box{

margin:auto;

margin-top:150px;

background:white;

width:400px;

padding:40px;

text-align:center;

border-radius:15px;

box-shadow:0px 10px 30px rgba(0,0,0,.2);

}

.result{

font-size:30px;

color:#2c7be5;

margin:20px;

}

.btn{

padding:12px 30px;

background:#2c7be5;

color:white;

text-decoration:none;

border-radius:10px;

}

</style>

</head>


<body>


<div class="box">

<h2>Prediction Result</h2>


<div class="result">

{{ prediction }}

</div>


<a href="/" class="btn">

Predict Again

</a>


</div>


</body>

</html>
